kind = "web"
previewPath = "/"
title = "Her Planner"
version = "1.0.0"
id = "artifacts/her-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20667

[services.development]
run = "pnpm --filter @workspace/her-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/her-planner", "run", "build" ]
publicDir = "artifacts/her-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20667"
BASE_PATH = "/"

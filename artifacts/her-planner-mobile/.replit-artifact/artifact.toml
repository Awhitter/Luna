kind = "mobile"
previewPath = "/mobile/"
title = "Her Planner Mobile"
version = "1.0.0"
id = "artifacts/her-planner-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 25048

[services.development]
run = "pnpm --filter @workspace/her-planner-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/her-planner-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/her-planner-mobile", "run", "serve" ]

[services.env]
PORT = "25048"
BASE_PATH = "/mobile/"
